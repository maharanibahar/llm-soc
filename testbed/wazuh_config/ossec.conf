<!--
  Wazuh Configuration for LLM-SOC Pipeline
  Key settings:
  - logall_json: Stores EVERY log in archives.json (no aggregation)
  - Monitors: ModSecurity audit logs + Nginx access logs
-->
<ossec_config>

  <global>
    <jsonout_output>yes</jsonout_output>
    <logall>yes</logall>
    <logall_json>yes</logall_json>
    <alerts_log>yes</alerts_log>
  </global>

  <alerts>
    <log_alert_level>1</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
  </remote>

  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_password>no</use_password>
  </auth>

  <!-- ModSecurity Audit Logs -->
  <localfile>
    <location>/var/log/modsecurity/modsec_audit.log</location>
    <log_format>syslog</log_format>
    <label key="log_source">modsec_audit</label>
  </localfile>

  <!-- Nginx Access Logs (from ModSecurity container) -->
  <localfile>
    <location>/var/log/nginx/access.log</location>
    <log_format>syslog</log_format>
    <label key="log_source">nginx_access</label>
  </localfile>

  <!-- Nginx Error Logs (contains ModSecurity inline alerts) -->
  <localfile>
    <location>/var/log/nginx/error.log</location>
    <log_format>syslog</log_format>
    <label key="log_source">nginx_error</label>
  </localfile>

  <rootcheck>
    <disabled>yes</disabled>
  </rootcheck>

  <syscheck>
    <disabled>yes</disabled>
  </syscheck>

  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

</ossec_config>
